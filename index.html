<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi Hub Full Stack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="Apuntes y ejercicios de mi camino de Frontend a Full Stack con Node.js" />
  <!-- Tema (vue) de Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #2c7a7b;
      --sidebar-width: 17rem;
    }
    .markdown-section { max-width: 50rem; }
    .app-name-link img, .app-name span { font-weight: 700; }
    .sidebar-nav strong { color: #555; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <div id="app">Cargando…</div>
  <script>
    window.$docsify = {
      name: '🚀 Mi Hub Full Stack',
      repo: 'https://github.com/jzamituy/fullstack-roadmap',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 4,
      search: {
        placeholder: 'Buscar…',
        noData: 'Sin resultados.',
        depth: 4
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
        crossChapter: true
      },
      count: { countable: true, position: 'top', label: 'min de lectura' }
    };
  </script>
  <!-- Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Buscador -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Botón de copiar en bloques de código -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <!-- Paginación entre páginas -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <!-- Tiempo de lectura -->
  <script src="//cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
  <!-- Resaltado de sintaxis: TypeScript / JS / Bash / SQL -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
